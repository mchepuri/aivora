name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches:
      - main
    paths:
      - 'apps/**/*.ts'
      - 'apps/**/*.tsx'
      - 'apps/**/*.js'
      - 'apps/**/*.jsx'
      - 'apps/**/*.css'
      - 'apps/**/*.scss'
      - 'apps/**/tailwind.config.*'
      - 'apps/**/postcss.config.*'
      - 'packages/**/*.ts'
      - 'packages/**/*.tsx'
    paths-ignore:
      - '**/package-lock.json'
      - '**/prisma/migrations/**'

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load review rules
        id: rules
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          {
            echo 'prompt<<REVIEW_EOF'
            printf '## Pull Request Context\n\n'
            printf 'PR: #%s — %s\n' "$PR_NUMBER" "$PR_TITLE"
            printf 'Base SHA: %s\n' "$BASE_SHA"
            printf 'Head SHA: %s\n\n' "$HEAD_SHA"
            printf '## Changed Files\n\n```\n'
            git diff --stat "$BASE_SHA" "$HEAD_SHA"
            printf '```\n\n'
            printf '## Full Diff\n\n```diff\n'
            DIFF_SIZE=$(git diff "$BASE_SHA" "$HEAD_SHA" | wc -c)
            if [ "$DIFF_SIZE" -gt 200000 ]; then
              printf 'Diff too large to inline (%s bytes). Use git diff %s %s -- <file> to inspect specific files.\n' "$DIFF_SIZE" "$BASE_SHA" "$HEAD_SHA"
            else
              git diff "$BASE_SHA" "$HEAD_SHA"
            fi
            printf '```\n\n'
            printf 'The diff above is complete. Do not use git or Read tools to fetch code — everything you need is above.\n\n'
            printf '---\n\n'
            cat .github/CLAUDE_REVIEW.md
            echo 'REVIEW_EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: ${{ steps.rules.outputs.prompt }}
          show_full_output: true
          settings: |
            {
              "model": "claude-sonnet-4-6",
              "permissions": {
                "allow": ["Bash(gh api*)", "Write"]
              }
            }

