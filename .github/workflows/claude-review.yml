name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches:
      - main
    paths:
      - 'apps/**/*.ts'
      - 'apps/**/*.tsx'
      - 'apps/**/*.js'
      - 'apps/**/*.jsx'
      - 'apps/**/*.css'
      - 'apps/**/*.scss'
      - 'apps/**/tailwind.config.*'
      - 'apps/**/postcss.config.*'
      - 'packages/**/*.ts'
      - 'packages/**/*.tsx'

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load review rules
        id: rules
        run: |
          {
            echo 'prompt<<REVIEW_EOF'
            cat .github/CLAUDE_REVIEW.md
            echo 'REVIEW_EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: ${{ steps.rules.outputs.prompt }}
          show_full_output: true
          settings: |
            {
              "permissions": {
                "allow": ["Bash(git*)", "Bash(gh*)", "Write"]
              }
            }

