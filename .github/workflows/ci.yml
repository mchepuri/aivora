name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Generate Prisma client
        run: npx prisma generate --schema=apps/api/prisma/schema.prisma

      - name: Generate Astryx theme
        run: npm run theme:build --workspace=apps/web

      - name: Typecheck — web
        run: cd apps/web && npx tsc --noEmit

      - name: Typecheck — api
        run: cd apps/api && npx tsc --noEmit

      - name: Typecheck — api vercel entry
        run: cd apps/api && npx tsc --project tsconfig.vercel.json

      - name: Build — web
        run: npm run build --workspace=apps/web
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:3001/api' }}

      - name: Build — api
        run: npm run build --workspace=apps/api
